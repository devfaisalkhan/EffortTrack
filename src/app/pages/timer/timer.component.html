<div class="text-center">
    <div class="timer-section py-4">
      <h4 class="text-secondary mb-3">Timer</h4>
      <h1 class="display-1 text-dark fw-bold">{{ formatTime(timer) }}</h1>
      <div class="mt-4">
        <button 
          class="btn btn-lg btn-success shadow-lg me-3 px-5 py-3" 
          (click)="startTimer()" 
          [disabled]="isRunning">
          Start
        </button>
        <button 
          class="btn btn-lg btn-danger shadow-lg px-5 py-3" 
          (click)="stopTimer()" 
          [disabled]="!isRunning">
          Stop
        </button>
      </div>
    </div>
  
    <div class="tracking-info mt-5">
      <h5 class="text-secondary">Tracking Info</h5>
      <p class="text-muted" *ngIf="startTime">
        Started at: <span class="fw-bold text-dark">{{ startTime | date: 'shortTime' }}</span>
      </p>
      <p class="text-muted" *ngIf="stopTime">
        Stopped at: <span class="fw-bold text-dark">{{ stopTime | date: 'shortTime' }}</span>
      </p>
    </div>
  </div>
