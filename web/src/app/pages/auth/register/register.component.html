<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow" style="max-width: 500px; width: 100%">
    <h3 class="text-center mb-3" style="color: var(--primary)">
      Register - TeachNearby
    </h3>
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit(registerForm.value)">
      <!-- Name Field -->
      <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input
          type="text"
          id="name"
          class="form-control"
          formControlName="name"
          placeholder="e.g., John Doe"
        />
        <div
          *ngIf="
            registerForm.get('name')?.invalid &&
            registerForm.get('name')?.touched
          "
          class="text-danger mt-1"
        >
          Name is required.
        </div>
      </div>

      <!-- Email Field -->
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input
          type="email"
          id="email"
          class="form-control"
          formControlName="email"
          placeholder="e.g., johndoe@example.com"
        />
        <div
          *ngIf="
            registerForm.get('email')?.invalid &&
            registerForm.get('email')?.touched
          "
          class="text-danger mt-1"
        >
          Valid email is required.
        </div>
      </div>

      <!-- Password Field -->
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input
          type="password"
          id="password"
          class="form-control"
          formControlName="password"
          placeholder="At least 6 characters"
        />
        <div
          *ngIf="
            registerForm.get('password')?.invalid &&
            registerForm.get('password')?.touched
          "
          class="text-danger mt-1"
        >
          Password must be at least 6 characters.
        </div>
      </div>

      <!-- Confirm Password Field -->
      <div class="mb-3">
        <label for="confirmPassword" class="form-label">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          class="form-control"
          formControlName="confirmPassword"
          placeholder="Re-enter your password"
        />
        <div
          *ngIf="
            registerForm.get('confirmPassword')?.invalid &&
            registerForm.get('confirmPassword')?.touched
          "
          class="text-danger mt-1"
        >
          Passwords must match.
        </div>
      </div>

      <!-- Role Selection -->
      <div class="mb-3">
        <label for="role" class="form-label">I am a:</label>
        <select id="role" class="form-select" formControlName="role">
          <option value="" disabled selected>-- Select your role --</option>
          <option value="tutor">Tutor</option>
          <option value="student">Student</option>
        </select>
        <div
          *ngIf="
            registerForm.get('role')?.invalid &&
            registerForm.get('role')?.touched
          "
          class="text-danger mt-1"
        >
          Please select a role.
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn btn-primary w-100">Register</button>
    </form>
    <div class="text-center mt-2">
      <p class="mb-0">
        Already have an account?
        <a
          routerLink="/login"
          class="text-decoration-none"
          style="color: var(--secondary)"
          >Sign In</a
        >
      </p>
    </div>
  </div>
</div>
