
<angular-flipclock></angular-flipclock>
<div class="container mt-5">
    <!-- <h2 class="text-center mb-4">EffortTrack</h2> -->
    
    <div class="card p-4 shadow-sm">
      <h4>Select or Create a Project</h4>
  
      <ul class="list-group mt-3">
        <li 
          class="list-group-item d-flex justify-content-between align-items-center"
          *ngFor="let project of projects" (click)="onProjectClicked(project)"
          style="cursor: pointer;">
          {{ project.name }}
          <span class="badge bg-primary">Open</span>
        </li>
      </ul>
  
      <button class="btn btn-success mt-3 w-100"  data-bs-toggle="modal" data-bs-target="#projectModal">
        Create New Project
      </button>
    </div>
</div>
  

  
<div class="modal fade" id="projectModal" tabindex="-1" aria-labelledby="projectModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="projectModalLabel">New Project</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form (ngSubmit)="createProject()">
            <div class="mb-3">
              <label for="projectName" class="form-label">Project Name</label>
              <input type="text" class="form-control" id="projectName" [(ngModel)]="projectName" name="projectName" required>
            </div>
            <div class="modal-footer">
              <button id="cancelModal" type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" class="btn btn-primary">Create</button>
            </div>
          </form>
        </div>
      </div>
    </div>
</div>
